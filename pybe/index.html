<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyBe — Learn Python the Doraemon Way!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Quicksand:wght@400;500;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ===================== BACKGROUND ===================== -->
    <div class="sky-background">
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>
        <div class="cloud cloud-3"></div>
        <div class="star star-1">✦</div>
        <div class="star star-2">✦</div>
        <div class="star star-3">✦</div>
    </div>

    <!-- ===================== LANDING HERO ===================== -->
    <div class="landing-wrapper">
        <div class="doraemon-container">
            <!-- Doraemon SVG Character -->
            <div class="doraemon" id="doraemon">
                <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">
                    <!-- Body -->
                    <ellipse cx="100" cy="155" rx="65" ry="60" fill="#00AEEF"/>
                    <!-- White belly -->
                    <ellipse cx="100" cy="165" rx="40" ry="40" fill="#FFFFFF"/>
                    <!-- Red bow -->
                    <circle cx="80" cy="115" r="12" fill="#E53935"/>
                    <circle cx="120" cy="115" r="12" fill="#E53935"/>
                    <polygon points="100,108 92,122 108,122" fill="#E53935"/>
                    <!-- Head -->
                    <circle cx="100" cy="80" r="68" fill="#00AEEF"/>
                    <!-- White face -->
                    <ellipse cx="100" cy="88" rx="50" ry="42" fill="#FFFFFF"/>
                    <!-- Eyes -->
                    <ellipse cx="75" cy="75" rx="14" ry="17" fill="#FFFFFF"/>
                    <ellipse cx="125" cy="75" rx="14" ry="17" fill="#FFFFFF"/>
                    <circle cx="77" cy="77" r="9" fill="#1A2A3A"/>
                    <circle cx="127" cy="77" r="9" fill="#1A2A3A"/>
                    <circle cx="80" cy="73" r="3" fill="#FFFFFF"/>
                    <circle cx="130" cy="73" r="3" fill="#FFFFFF"/>
                    <!-- Red nose -->
                    <circle cx="100" cy="95" r="8" fill="#E53935"/>
                    <!-- Nose line -->
                    <line x1="100" y1="103" x2="100" y2="115" stroke="#1A2A3A" stroke-width="2"/>
                    <!-- Smile -->
                    <path d="M 75 110 Q 100 130 125 110" stroke="#1A2A3A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
                    <!-- Whiskers -->
                    <line x1="55" y1="90" x2="78" y2="95" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <line x1="55" y1="100" x2="78" y2="100" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <line x1="55" y1="110" x2="78" y2="105" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <line x1="145" y1="90" x2="122" y2="95" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <line x1="145" y1="100" x2="122" y2="100" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <line x1="145" y1="110" x2="122" y2="105" stroke="#1A2A3A" stroke-width="2" stroke-linecap="round"/>
                    <!-- Ears -->
                    <circle cx="55" cy="28" r="18" fill="#00AEEF"/>
                    <circle cx="145" cy="28" r="18" fill="#00AEEF"/>
                    <circle cx="55" cy="28" r="10" fill="#E53935"/>
                    <circle cx="145" cy="28" r="10" fill="#E53935"/>
                    <!-- Arms -->
                    <ellipse cx="38" cy="150" rx="18" ry="25" fill="#00AEEF" transform="rotate(-20 38 150)"/>
                    <ellipse cx="162" cy="150" rx="18" ry="25" fill="#00AEEF" transform="rotate(20 162 150)"/>
                    <!-- Legs -->
                    <ellipse cx="70" cy="210" rx="22" ry="16" fill="#00AEEF"/>
                    <ellipse cx="130" cy="210" rx="22" ry="16" fill="#00AEEF"/>
                    <!-- Pocket -->
                    <ellipse cx="100" cy="175" rx="25" ry="18" fill="#FFC107" opacity="0.7"/>
                </svg>
            </div>

            <!-- Speech Bubble -->
            <div class="speech-bubble" id="speechBubble">
                <p id="typewriterText" class="typewriter-text"></p>
            </div>
        </div>

        <!-- Hero Text -->
        <div class="hero-text" id="heroText">
            <h1 class="hero-title">100 Levels. Zero Boring Lectures.</h1>
            <p class="hero-subtitle">Learn Python the fun way — with Doraemon by your side!</p>
            <a href="home.html?reset=true" class="cta-btn" id="ctaBtn" target="_self">
                <span>Start My Adventure</span>
                <i class="fas fa-rocket"></i>
            </a>
        </div>
    </div>

    <!-- Floating Gadgets -->
    <div class="gadget gadget-1"><i class="fas fa-door-open"></i></div>
    <div class="gadget gadget-2"><i class="fas fa-clock"></i></div>
    <div class="gadget gadget-3"><i class="fas fa-broom"></i></div>

    <script src="js/main.js"></script>
</body>
</html>
