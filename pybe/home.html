                    <circle cx="145" cy="28" r="18" fill="#00AEEF"/>

        <!-- Level Grid -->

        <!-- Progress Bar Section -->

    <!-- ===== GADGET UNLOCK OVERLAY ===== -->
    <div class="gadget-unlock-overlay" id="gadgetUnlockOverlay">
        <div class="portal-effect"></div>
        <div class="unlock-card">
            <div class="unlock-title">New Gadget Unlocked!</div>
            <div class="unlock-gadget-icon" id="unlockGadgetIcon">🚁</div>
            <div class="unlock-name" id="unlockGadgetName">Bamboo Copter</div>
            <div class="unlock-desc" id="unlockGadgetDesc">Flies over code obstacles. Unlocks advanced stepper shortcuts.</div>

    <!-- ===== POCKET INVENTORY MODAL ===== -->
    <div class="pocket-modal" id="pocketModal">
        <div class="pocket-content">
            <div class="pocket-header">
                <div class="pocket-title">
                    <i class="fas fa-shopping-bag"></i> Nobita's 4D Pocket
                </div>
                <button class="pocket-close" id="pocketCloseBtn">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="pocket-grid" id="pocketGrid">
                <!-- Populated by JS -->
            </div>
            <div class="gadget-detail-panel" id="gadgetDetailPanel">
                <div class="gadget-detail-header">
                    <div class="gadget-detail-icon" id="detailGadgetIcon">🚁</div>
                    <div class="gadget-detail-title-block">
                        <div class="gadget-detail-title" id="detailGadgetTitle">Bamboo Copter</div>
                        <div class="gadget-detail-milestone" id="detailGadgetMilestone">Unlocked at Level 10</div>
                    </div>
                </div>
                <div class="gadget-detail-desc" id="detailGadgetDesc">Flies over code obstacles. Unlocks advanced stepper shortcuts.</div>
            </div>
        </div>
    </div>

    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="js/progress.js"></script>
    <script src="js/levels_data.js"></script>
    <script src="js/levels.js"></script>
    <script src="js/floating_pocket.js"></script>
    <script src="js/xp_system.js"></script>
    <script>
    (function () {
        const TOTAL_LEVELS = 100;

        // ── Day / Night cycle ──────────────────────────────────
        const hour = new Date().getHours();
        let timePeriod = 'day';
        if (hour >= 6 && hour < 9)       timePeriod = 'morning';
        else if (hour >= 9 && hour < 17)  timePeriod = 'day';
        else if (hour >= 17 && hour < 20) timePeriod = 'evening';
        else                              timePeriod = 'night';

        document.body.classList.add(`time-${timePeriod}`);

        // Generate random stars for night sky
        if (timePeriod === 'night') {
            const starsContainer = document.getElementById('nightStars');
            if (starsContainer) {
                for (let i = 0; i < 60; i++) {
                    const star = document.createElement('div');
                    star.className = 'night-star';
                    star.style.cssText = `
                        left: ${Math.random() * 100}%;
                        top:  ${Math.random() * 70}%;
                        width:  ${Math.random() * 3 + 1}px;
                        height: ${Math.random() * 3 + 1}px;
                        animation-delay: ${Math.random() * 3}s;
                        animation-duration: ${Math.random() * 2 + 1.5}s;
                    `;
                    starsContainer.appendChild(star);
                }
            }
        }

        // One-time reset to ensure testing progress starts fresh
        if (!localStorage.getItem('pybe_journey_reset_v3')) {
            localStorage.removeItem('pybe_progress_v1');
            localStorage.removeItem('pybe_student_name');
            localStorage.removeItem('pybe_project_code');
            localStorage.removeItem('pybe_github_link');
            localStorage.removeItem('pybe_project_type');
            localStorage.setItem('pybe_journey_reset_v3', 'true');
        }

        // ── Load progress ──────────────────────────────────────
        let progress = window.PyBe ? window.PyBe.getProgress() : { currentLevel: 0, completed: [] };

        // Force all levels to be unlocked permanently once the intro story is completed/skipped
        if (progress.currentLevel > 0) {
            if (progress.completed && progress.completed.length === 100) {
                progress.completed = [];
            }
            progress.currentLevel = 100;
            if (window.PyBe && window.PyBe.saveProgress) {
                window.PyBe.saveProgress(progress);
            }
        }

        // ── Build 10×10 grid ────────────────────────────────────
        const grid = document.getElementById('levelGrid');
        
        function buildGrid() {
            if (!grid) return;
            grid.innerHTML = '';
            for (let lvl = 1; lvl <= TOTAL_LEVELS; lvl++) {
                const card = document.createElement('div');
                card.className = 'level-card';
                card.dataset.level = lvl;

                let state = 'locked';
                if (progress.completed.includes(lvl)) state = 'completed';
                else if (progress.currentLevel > 0 && lvl <= progress.currentLevel) state = 'unlocked';
                card.classList.add(state);

                if (lvl === progress.currentLevel && state === 'unlocked') {
                    card.classList.add('current');
                }

                // Locked cards still show their level number (greyed out) with a lock icon
                if (state === 'locked') {
                    card.innerHTML = `
                        <i class="fas fa-lock" style="font-size: clamp(10px, 2vw, 14px); margin-bottom: 4px; opacity: 0.65;"></i>
                        <span class="card-num">${lvl}</span>
                    `;
                } else {
                    // Stars for completed based on attempts
                    let starsHTML = '';
                    if (state === 'completed') {
                        const attempts = (progress.attempts && progress.attempts[lvl]) || 1;
                        let stars = 5;
                        if (attempts === 2) stars = 4;
                        else if (attempts === 3) stars = 3;
                        else if (attempts === 4 || attempts === 5) stars = 2;
                        else if (attempts > 5) stars = 1;

                        starsHTML = `<div class="card-stars">${Array(stars).fill('<i class="fas fa-star"></i>').join('')}</div>`;
                    }
                    card.innerHTML = `
                        ${starsHTML}
                        <span class="card-num">${lvl}</span>
                        ${state === 'completed' ? '<i class="fas fa-check card-check"></i>' : ''}
                    `;
                }

                // Click handler
                card.addEventListener('click', () => {
                    if (state === 'locked') {
                        card.classList.remove('shake');
                        void card.offsetWidth; // reflow to restart animation
                        card.classList.add('shake');
                        return;
                    }
                    window.location.href = `level.html?id=${lvl}`;
                });

                // 3D tilt + tooltip
                card.addEventListener('mousemove', (e) => {
                    if (state === 'locked') return;
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -12;
                    const rotateY = ((x - centerX) / centerX) * 12;
                    card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-4px)`;

                    // Tooltip positioning
                    const tooltip = document.getElementById('levelTooltip');
                    const ttTitle = document.getElementById('tooltipTitle');
                    const ttConcept = document.getElementById('tooltipConcept');
                    if (tooltip) {
                        const lvlData = window.levels && window.levels[lvl - 1];
                        const chapterTitles = [
                            'First Steps', 'Variables', 'User Input', 'Conditions',
                            'Loops', 'Functions', 'Lists', 'Dictionaries',
                            'File Handling', 'Projects'
                        ];
                        const chapter = chapterTitles[Math.floor((lvl - 1) / 10)] || 'Projects';

                        if (lvlData) {
                            if (ttTitle) ttTitle.textContent = `Level ${lvl} — ${lvlData.title}`;
                            if (ttConcept) ttConcept.textContent = lvlData.concept;
                        } else {
                            if (ttTitle) ttTitle.textContent = `Level ${lvl}`;
                            if (ttConcept) ttConcept.textContent = `Chapter: ${chapter}`;
                        }
                        const tx = e.clientX + 16;
                        const ty = e.clientY - 10;
                        tooltip.style.left = tx + 'px';
                        tooltip.style.top  = ty + 'px';
                        tooltip.classList.add('visible');
                    }
                });

                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                    const tooltip = document.getElementById('levelTooltip');
                    if (tooltip) tooltip.classList.remove('visible');
                });

                grid.appendChild(card);
            }
        }

        buildGrid();

        // ── Update progress display ─────────────────────────────
        const completed = progress.completed.length;
        const pct = Math.round((completed / TOTAL_LEVELS) * 100);

        const navText = document.getElementById('navProgressText');
        if (navText) navText.textContent = `${completed} / ${TOTAL_LEVELS} Cleared`;

        // Streak display
        const streak = progress.streak || 0;
        const streakEl = document.getElementById('navStreak');
        const streakTextEl = document.getElementById('navStreakText');
        if (streak > 0 && streakEl && streakTextEl) {
            streakEl.style.display = 'flex';
            streakTextEl.textContent = `${streak} day streak`;
        }

        const pctText = document.getElementById('progressPercent');
        if (pctText) pctText.textContent = `${pct}%`;

        const fill = document.getElementById('progressFill');
        if (fill) fill.style.width = `${pct}%`;

        // ── Doraemon Mascot messages ─────────────────────────
        const mascotText     = document.getElementById('mascotText');
        const mascotBubble   = document.getElementById('mascotBubble');
        const mascotDoraemon = document.getElementById('mascotDoraemon');
        const currentLvl = progress.currentLevel;

        function pickMessage(lvl) {
            if (completed === 100)         return { mood: 'excited', text: "YOU DID IT! 🎉 All 100 levels conquered! You are now a TRUE Python wizard! 🌟" };
            if (lvl === 0 && completed === 0) return { mood: 'happy',   text: "Welcome! Are you ready to start your Python journey? 🚀" };
            if (lvl === 1 && completed === 0) return { mood: 'happy',   text: "Hey future Python wizard! I'm Doraemon. Pick a level and let's start the adventure! 🚀" };
            if (lvl <= 5)                  return { mood: 'happy',   text: "You're off to a great start! Every Python master was once a beginner. Keep going! 💪" };
            if (lvl <= 15)                 return { mood: 'happy',   text: "Variables are like magic boxes — store anything in them! You're doing amazing! ✨" };
            if (lvl <= 30)                 return { mood: 'happy',   text: "Conditionals are like my Anywhere Door — different choices, different paths! 🚪" };
            if (lvl <= 50)                 return { mood: 'happy',   text: "Loops spin like my Bamboo Copter — round and round until the job is done! 🔄" };
            if (lvl <= 70)                 return { mood: 'happy',   text: "Halfway champion! Functions are like my gadget pouch — pack once, use anywhere! 🎒" };
            if (lvl <= 90)                 return { mood: 'happy',   text: "Advanced zone! Lists & dictionaries are like my pocket — organized power! 📦" };
            return { mood: 'happy', text: "Almost at Level 100! You're unstoppable — like a true Python hero! 🏆" };
        }

        const msg = pickMessage(currentLvl);
        if (mascotText)     mascotText.textContent = msg.text;
        if (mascotDoraemon) mascotDoraemon.className = `mascot-doraemon mood-${msg.mood}`;

        // Show bubble after short delay
        setTimeout(() => { if (mascotBubble) mascotBubble.classList.add('visible'); }, 1800);

        // Toggle bubble on mascot click
        if (mascotDoraemon) {
            mascotDoraemon.addEventListener('click', () => {
                if (mascotBubble) mascotBubble.classList.toggle('visible');
            });
        }

        // ── Confetti on completed levels ─────────────────────────
        const confettiCanvas = document.getElementById('confetti-canvas');
        
        function triggerConfettiExplosion() {
            if (!confettiCanvas) return;
            confettiCanvas.height = window.innerHeight;
            confettiCanvas.width = window.innerWidth;
            const ctx = confettiCanvas.getContext('2d');
            const pieces = [];
            const colors = ['#00AEEF', '#E53935', '#FFC107', '#4CAF50', '#FF69B4', '#9C27B0'];

            for (let i = 0; i < 80; i++) {
                pieces.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    w: Math.random() * 10 + 5,
                    h: Math.random() * 6 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rot: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 8,
                    speedY: Math.random() * 3 + 2,
                    speedX: (Math.random() - 0.5) * 2,
                    osc: Math.random() * Math.PI * 2,
                });
            }

            let frame = 0;
            function drawConfetti() {
                ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                pieces.forEach(p => {
                    p.y += p.speedY;
                    p.x += p.speedX + Math.sin(p.osc) * 0.5;
                    p.osc += 0.04;
                    p.rot += p.rotSpeed;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rot * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.y > confettiCanvas.height ? Math.max(0, 1 - (p.y - confettiCanvas.height) / 200) : 1;
                    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
                    ctx.restore();
                });
                frame++;
                if (frame < 180) requestAnimationFrame(drawConfetti);
                else ctx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
            drawConfetti();
        }

        if (confettiCanvas && completed > 0) {
            triggerConfettiExplosion();
        }

        // ── Level Unlock Animation ─────────────────────────────
        function animateLevelUnlock(levelId) {
            const card = document.querySelector(`.level-card[data-level="${levelId}"]`);
            if (!card) return;
            
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
            
            card.style.transition = 'all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            card.style.transform = 'scale(1.4) rotate(8deg)';
            card.style.boxShadow = '0 0 35px rgba(0, 174, 239, 0.8)';
            card.style.zIndex = '1000';
            
            setTimeout(() => {
                card.style.transform = 'scale(1)';
                card.style.boxShadow = '';
                card.style.zIndex = '';
                triggerConfettiExplosion();
            }, 1000);
        }

        // ── Full-Screen Animated Story Mode ──────────────────────────
        function showStoryMode() {
            const storyContainer = document.createElement('div');
            storyContainer.className = 'story-container';
            storyContainer.id = 'storyContainer';
            
            // Build Cinematic Stars
            let starsHTML = '';
            for (let i = 0; i < 40; i++) {
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                const size = Math.random() * 2 + 1;
                const delay = Math.random() * 3;
                starsHTML += `<div class="story-star" style="left:${left}%; top:${top}%; width:${size}px; height:${size}px; animation-delay:${delay}s;"></div>`;
            }

            storyContainer.innerHTML = `
                <div class="story-stars">${starsHTML}</div>
                <button class="story-skip-btn" id="storySkipBtn">
                    <span>Skip Story</span>
                    <i class="fas fa-step-forward"></i>
                </button>
                
                <div class="story-scene">
                    <!-- Doraemon character on the left -->
                    <div class="story-character story-doraemon float" id="storyDoraemon">
                        <svg viewBox="0 0 200 260" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                            <!-- Body -->
                            <ellipse cx="100" cy="178" rx="70" ry="65" fill="#00AEEF"/>
                            <!-- White belly -->

                if (typeInterval) clearInterval(typeInterval);
                
                // Update avatar
                const avatarCont = document.getElementById('dialogueAvatar');
                if (avatarCont) {
                    avatarCont.innerHTML = avatars[step.speaker][step.mood] || '';

                // Update speaker name
                const speakerEl = document.getElementById('dialogueSpeaker');
                if (speakerEl) {
                    speakerEl.textContent = step.speaker;
                    speakerEl.className = 'dialogue-speaker-name ' + step.speaker.toLowerCase() + '-name';
                }
                
                // Typewriter effect
                const textEl = document.getElementById('dialogueText');
                if (textEl) {
                    let charIndex = 0;
                    textEl.innerHTML = '';
                    typeInterval = setInterval(() => {
                        if (charIndex < step.text.length) {
                            textEl.innerHTML = step.text.substring(0, charIndex + 1) + '<span class="cursor"></span>';
                            charIndex++;
                        } else {
                            textEl.innerHTML = step.text;
                            clearInterval(typeInterval);
                            typeInterval = null;
                        }
                    }, 30);

                updateMainCharacterExpressions(step.speaker, step.mood);

                // Run action

            } else if (speaker === 'Nobita') {

                if (mood !== 'tripping' && nobiMouth.tagName.toLowerCase() !== 'path') {

                const updatedMouth = document.getElementById('nobiMouth');
                
                if (mood === 'happy') {
                    updatedMouth.setAttribute('d', 'M 92 138 Q 100 144 108 138');

                        <circle cx="82" cy="115" r="4" fill="#212121"/>

                } else if (mood === 'tripping') {
                    const newMouth = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
                    newMouth.id = 'nobiMouth';
                    newMouth.setAttribute('cx', '100');
                    newMouth.setAttribute('cy', '140');

                    newMouth.setAttribute('stroke', '#1A2A3A');

                    nobiEyes.innerHTML = `

                } else if (mood === 'sad') {
                    updatedMouth.setAttribute('d', 'M 90 142 Q 100 132 110 142');
                    nobiEyes.innerHTML = `
                        <path d="M 74 118 Q 82 108 90 118" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
                        <path d="M 110 118 Q 118 108 126 118" stroke="#212121" stroke-width="3" fill="none" stroke-linecap="round"/>
                    `;
                } else if (mood === 'determined') {
                    updatedMouth.setAttribute('d', 'M 90 138 L 110 138');
                    nobiEyes.innerHTML = `

        }

        // ===== GADGET UNLOCK SYSTEM LOGIC =====
        const GADGETS = [
            { id: 10,  name: "Bamboo Copter",  icon: "🚁", desc: "Flies over code obstacles. Unlocks advanced stepper shortcuts and visual fly-by animations.", milestone: 10 },
            { id: 20,  name: "Translation Jelly", icon: "🍮", desc: "Translates complex syntax. Unlocks detailed syntax definitions in coding sections.", milestone: 20 },
            { id: 30,  name: "Anywhere Door",   icon: "🚪", desc: "Teleports across space. Enables fast-jump chapter map navigation in the level selector.", milestone: 30 },
            { id: 40,  name: "Time Furoshiki",  icon: "🧣", desc: "Rewinds code state. Restores starter code instantly with a retro warp animation.", milestone: 40 },
            { id: 50,  name: "Memory Bread",   icon: "🍞", desc: "Eat to memorize. Unlocks Python data structures reference cheat-sheet.", milestone: 10 },
            { id: 60,  name: "Small Light",    icon: "🔦", desc: "Shrinks code complexity. Highlights redundant loops/lines or empty structures.", milestone: 60 },
            { id: 70,  name: "Big Light",      icon: "🔍", desc: "Inspects large variables. Shows detailed console logs and step-by-step traces in level editor.", milestone: 70 },
            { id: 80,  name: "Computer Pencil", icon: "✏️", desc: "Writes clean code. Unlocks automated line completions and smart syntax hints.", milestone: 80 },
            { id: 90,  name: "Gourmet Tablecloth", icon: "🍽️", desc: "Boosts coding focus. Unlocks alternative visual retro/future themes.", milestone: 90 },
            { id: 100, name: "Super Python Glove", icon: "🥊", desc: "Smashes any bug in sight. Certified Python wizard badge to brag in your achievements!", milestone: 100 }
        ];

        // Web Audio API Synthesizer Sound Player
        function playSynthSound(type) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                
                if (type === 'unlock') {
                    // Rising arpeggio sound (cinematic chime)
                    const now = ctx.currentTime;
                    const notes = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50]; // C4, E4, G4, C5, E5, G5, C6
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, now + i * 0.12);
                        
                        gain.gain.setValueAtTime(0.15, now + i * 0.12);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.12 + 0.3);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + i * 0.12);
                        osc.stop(now + i * 0.12 + 0.35);
                    });
                } else if (type === 'claim') {
                    // Victory fanfare chime
                    const now = ctx.currentTime;
                    const notes = [523.25, 659.25, 783.99, 1046.50, 1318.51];
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, now + i * 0.08);
                        
                        gain.gain.setValueAtTime(0.2, now + i * 0.08);
                        gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.2);
                        
                        osc.connect(gain);
                        gain.connect(ctx.destination);
                        osc.start(now + i * 0.08);
                        osc.stop(now + i * 0.08 + 0.25);
                    });
                } else if (type === 'click') {
                    // Standard click chime
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.1);
                    
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.12);
                } else if (type === 'error') {
                    // Small locked buzz sound
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(120, ctx.currentTime);
                    
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
                    
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.26);
                }
            } catch (e) {
                console.warn("AudioContext initialization blocked or failed", e);
            }
        }

        // Check for pending gadget unlocks
        function checkGadgetUnlocks() {
            const completedCount = progress.completed.length;
            
            // Find gadgets whose milestone is met but not yet in progress.unlockedGadgets
            const pendingGadget = GADGETS.find(g => completedCount >= g.milestone && !progress.unlockedGadgets.includes(g.milestone));
            
            if (pendingGadget) {
                // Trigger unlock overlay
                setTimeout(() => {
                    const overlay = document.getElementById('gadgetUnlockOverlay');
                    const iconEl = document.getElementById('unlockGadgetIcon');
                    const nameEl = document.getElementById('unlockGadgetName');
                    const descEl = document.getElementById('unlockGadgetDesc');
                    
                    if (overlay && iconEl && nameEl && descEl) {
                        iconEl.textContent = pendingGadget.icon;
                        nameEl.textContent = pendingGadget.name;
                        descEl.textContent = pendingGadget.desc;
                        
                        overlay.classList.add('visible');
                        playSynthSound('unlock');
                        
                        // Handle Claim
                        document.getElementById('claimGadgetBtn').onclick = () => {
                            playSynthSound('claim');
                            progress.unlockedGadgets.push(pendingGadget.milestone);
                            window.PyBe.saveProgress(progress);
                            
                            overlay.classList.remove('visible');
                            updatePocketBadge();
                            
                            // Check for any more pending unlocks (cascade unlocks)
                            setTimeout(checkGadgetUnlocks, 1000);
                        };
                    }
                }, 1200); // Small delay to let the page load/confetti finish first
            }
        }

        // Update Pocket badge indicator
        function updatePocketBadge() {
            const completedCount = progress.completed.length;
            const pendingUnlocks = GADGETS.filter(g => completedCount >= g.milestone && !progress.unlockedGadgets.includes(g.milestone)).length;
            
            const badge = document.getElementById('pocketBadge');
            if (badge) {
                if (pendingUnlocks > 0) {
                    badge.style.display = 'flex';
                    badge.textContent = '!';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // Build and display the Pocket grid modal
        function openPocketModal() {
            playSynthSound('click');
            const grid = document.getElementById('pocketGrid');
            const modal = document.getElementById('pocketModal');
            const detailPanel = document.getElementById('gadgetDetailPanel');
            
            if (!grid || !modal || !detailPanel) return;
            
            grid.innerHTML = '';
            detailPanel.classList.remove('visible'); // hide details until clicked
            
            GADGETS.forEach(g => {
                const slot = document.createElement('div');
                slot.className = 'gadget-slot';
                
                const isUnlocked = progress.unlockedGadgets.includes(g.milestone);
                
                if (isUnlocked) {
                    slot.classList.add('unlocked');
                    slot.innerHTML = `
                        <div class="gadget-slot-icon">${g.icon}</div>
                        <div class="gadget-slot-name">${g.name}</div>
                    `;
                    
                    slot.onclick = () => {
                        playSynthSound('click');
                        showGadgetDetails(g, true);
                    };
                } else {
                    slot.classList.add('locked');
                    slot.innerHTML = `
                        <div class="gadget-slot-icon"><i class="fas fa-lock" style="font-size:24px; opacity:0.6;"></i></div>
                        <div class="gadget-slot-name">Level ${g.milestone}</div>
                    `;
                    
                    slot.onclick = () => {
                        playSynthSound('error');
                        showGadgetDetails(g, false);
                    };
                }
                
                grid.appendChild(slot);
            });
            
            modal.classList.add('visible');
        }

        function showGadgetDetails(gadget, isUnlocked) {
            const panel = document.getElementById('gadgetDetailPanel');
            const icon = document.getElementById('detailGadgetIcon');
            const title = document.getElementById('detailGadgetTitle');
            const milestone = document.getElementById('detailGadgetMilestone');
            const desc = document.getElementById('detailGadgetDesc');
            
            if (!panel || !icon || !title || !milestone || !desc) return;
            
            if (isUnlocked) {
                icon.textContent = gadget.icon;
                title.textContent = gadget.name;
                milestone.textContent = `Unlocked at Level ${gadget.milestone}`;
                desc.textContent = gadget.desc;
            } else {
                icon.textContent = "🔒";
                title.textContent = "Locked Gadget";
                milestone.textContent = `Unlocks at Level ${gadget.milestone}`;
                desc.textContent = `Keep learning Python! Complete ${gadget.milestone} levels to unlock the ${gadget.name} and restore it to Doraemon's pocket.`;
            }
            
            panel.classList.add('visible');
        }

        function closePocketModal() {
            playSynthSound('click');
            const modal = document.getElementById('pocketModal');
            if (modal) modal.classList.remove('visible');
        }

        // Register event listeners
        const pocketCloseBtn = document.getElementById('pocketCloseBtn');
        const pocketModalEl = document.getElementById('pocketModal');
        if (pocketCloseBtn) pocketCloseBtn.onclick = closePocketModal;
        if (pocketModalEl) {
            pocketModalEl.onclick = (e) => {
                if (e.target === pocketModalEl) closePocketModal();
            };
        }

        // Initialize gadget badge and check triggers
        updatePocketBadge();
        checkGadgetUnlocks();

        // Show Story Mode if they are at Level 0
        if (progress.currentLevel === 0) {
            showStoryMode();
        }
    })();
    </script>
